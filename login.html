<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Feedback Portal</title>
  <meta name="description" content="Admin login for feedback dashboard." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="container main-header">
    <div class="logo">
      <span class="logo-accent">Feedback</span>Portal
    </div>
  </header>
  <main class="container login-container">
    <section class="login-panel glass-panel" id="loginSection">
      <h1>Admin Login</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="admin@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>
      <div id="loginError" class="error-message" style="display:none;">Invalid email or password.</div>
    </section>
  </main>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
