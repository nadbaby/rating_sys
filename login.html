<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Login - Feedback System</title>
  <meta name="description" content="Sign in to access the admin dashboard or employee progress report." />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ff9f0a" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>

<body>
  <header class="container main-header">
    <div class="logo">
      <span class="logo-accent">Feedback</span>Portal
    </div>
    <button id="themeToggleBtn">
      Light Mode
    </button>
  </header>
  <main class="container login-container">
    <section class="login-panel glass-panel" id="loginSection">
      <h1>Portal Login</h1>
      <p class="portal-subtitle" style="font-size: 0.85rem; color: var(--color-text-secondary); line-height: 1.4; margin-top: 0.35rem; text-align: center;">
        Sign in to access the Admin Dashboard or Employee Progress Report.
      </p>
      <form id="loginForm" style="margin-top: 1.25rem;">
        <div class="form-group">
          <label for="email">Email or Employee Name</label>
          <input type="text" id="email" placeholder="admin@example.com or Employee Name" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>
      <div id="loginError" class="error-message" style="display:none; margin-top: 1rem; text-align: center;">Invalid email or password.</div>
    </section>
  </main>
  <script type="module" src="js/admin.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('Service Worker registered successfully!', reg.scope))
          .catch((err) => console.log('Service Worker registration failed:', err));
      });
    }
  </script>
</body>

</html>
